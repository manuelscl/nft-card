<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <title>NFT Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }
        body {
            background: hsl(217, 54%, 11%);
        }
        .nft-card {
            max-width: 340px;
            background: hsl(216, 50%, 16%);
            border-radius: 10px;
            padding: 20px 20px;
        }
        .nft-view-img {
            display: flex;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }
        .view-img {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            transition: 0.3s ease;
        }
        .view-img-icon {
            opacity: 0;
            transition: 0.3s ease;
        }
        .nft-view-img:hover .view-img {
            background: hsla(178, 100%, 50%, 0.50);
        }
        .nft-view-img:hover .view-img-icon {
            opacity: 100;
        }
        .nft-image {
            width: 100%;
        }
        .nft-content {
            margin-top: 20px;
        }
        .nft-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .nft-title a {
            color: white;
            text-decoration: none;
            transition: 0.3s ease;
        }
        .nft-title:hover a {
            color:hsl(178, 100%, 50%);
        }
        .nft-description {
            font-size: 18px;
            font-weight: 300;
            color: hsl(215, 51%, 70%);
        }
        .nft-price-dueDate {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid hsl(215, 32%, 27%);
        }
        .nft-price, .nft-dueDate {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .nft-price {
            font-weight: 400;
            color:hsl(178, 100%, 50%);
        }
        .nft-dueDate {
            color:hsl(215, 51%, 70%);
        }
        .nft-price img {
            width: 10px;
        }
        .nft-dueDate img {
            width: 16px;
        }
        .nft-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .nft-author img {
            width: 40px;
            border: 1px solid white;
            border-radius: 50%;
        }
        .nft-author p {
            font-size: 14px;
            font-weight: 300;
            color:hsl(215, 51%, 70%);
        }
        .nft-author p a {
            color: white;
            text-decoration: none;
            transition: 0.3s ease;
        }
        .nft-author p a:hover {
            color:hsl(178, 100%, 50%);
        }
    </style>
</head>
<body>
    <main>
        <section class="container">
            <div class="nft-card">
                <div class="nft-view-img">
                    <div class="view-img">
                        <img class="view-img-icon" src="./images/icon-view.svg" alt="">
                    </div>
                    <img class="nft-image" src="./images/image-equilibrium.jpg" alt="Nombre del NFT, Equilibrium">
                </div>

                <div class="nft-content">
                    <h1 class="nft-title">
                        <a href="#">Equilibrium #3429</a>
                    </h1>
                    <p class="nft-description">Our Equilibrium collection promotes balance and calm.</p>
                    <div class="nft-price-dueDate">
                        <p class="nft-price"><img src="./images/icon-ethereum.svg" alt="ETH-Icon"></img>0.041 ETH</p>
                        <p class="nft-dueDate"><img src="./images/icon-clock.svg" alt="Clock-Icon">3 days left</p>
                    </div>
                    <div class="nft-author">
                        <img src="./images/image-avatar.png" alt="Author-image">
                        <p>Creation of <a href="#">Jules Wyvern</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
